<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Premium Neon Gradient -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" /> <!-- Bright Cyan -->
      <stop offset="100%" stop-color="#7000FF" /> <!-- Deep Purple -->
    </linearGradient>
  </defs>
  
  <!-- Dark Background matching standard Tailwind dark mode (Slate 900) -->
  <rect width="100" height="100" rx="24" fill="#0F172A" />
  
  <!-- Subtle glassmorphic inner border -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" />
  
  <!-- Stylized <A/> React Component Syntax -->
  <g fill="none" stroke="url(#brandGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Left Bracket < -->
    <path d="M 20 36 L 6 50 L 20 64" />
    
    <!-- The Letter A -->
    <path d="M 40 26 L 28 74" /> <!-- Left Leg -->
    <path d="M 40 26 L 52 74" /> <!-- Right Leg -->
    <path d="M 32 58 L 48 58" /> <!-- Crossbar -->
    
    <!-- Forward Slash / -->
    <path d="M 72 26 L 60 74" />
    
    <!-- Right Bracket > -->
    <path d="M 80 36 L 94 50 L 80 64" />
    
  </g>
</svg>
